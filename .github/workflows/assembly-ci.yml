name: Bare-Metal Assembly CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install NASM Compiler
      run: sudo apt-get update && sudo apt-get install -y nasm

    - name: Adapt EMU8086 Syntax for NASM Compatibility
      run: |
        echo "Translating MASM/EMU8086 dialect to strict NASM..."
        # 1. #make_boot# etiketini yorum yap
        find . -name "*.asm" -exec sed -i 's/^#make_boot#/; #make_boot#/gi' {} +
        # 2. BYTE PTR ve WORD PTR ifadelerini NASM formatina cevir
        find . -name "*.asm" -exec sed -i 's/BYTE PTR/BYTE/gi' {} +
        find . -name "*.asm" -exec sed -i 's/WORD PTR/WORD/gi' {} +
        # 3. MASM PROC NEAR ifadelerini NASM etiketi formatina (:) cevir
        find . -name "*.asm" -exec sed -i 's/PROC NEAR/:/gi' {} +
        # 4. NASM'in anlamadigi ENDP iceren satirlari tamamen yorum satirina cevir
        find . -name "*.asm" -exec sed -i 's/.*ENDP.*/; &/' {} +
        # 5. NASM buyuk/kucuk harfe duyarlidir. VRAM dosyasindaki donguyu esitle.
        find . -name "*.asm" -exec sed -i 's/ekrani_boya_dongu/EKRANI_BOYA_DONGU/gi' {} +

    - name: Compile Goktug OS Bootloader (Bare-Metal Sector)
      run: |
        echo "Building Bootloader Kernel..."
        if [ -f "03-Goktug-OS-BOOT/goktug_os.asm" ]; then
          nasm -f bin 03-Goktug-OS-BOOT/goktug_os.asm -o goktug_os.bin
          echo "Success: goktug_os.bin generated!"
        else
          echo "Bootloader source not found, skipping."
        fi

    - name: Compile VRAM Filler (Pure Binary Memory Map)
      run: |
        echo "Building Direct VRAM Engine..."
        if [ -f "04-Pure-VRAM-BIN/vram_filler.asm" ]; then
          nasm -f bin 04-Pure-VRAM-BIN/vram_filler.asm -o vram_filler.bin
          echo "Success: vram_filler.bin generated!"
        else
          echo "VRAM source not found, skipping."
        fi
